<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Tricia</title>

<style>
body {
    background-color: #0d0d0d;
    color: #eaeaea;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
}

#chat {
    max-width: 800px;
    margin: auto;
}

.message {
    margin-bottom: 15px;
    padding: 12px;
    border-radius: 10px;
    line-height: 1.4;
    white-space: pre-wrap;
}

.user {
    background-color: #1f1f1f;
}

.ai {
    background-color: #2a2a2a;
}

textarea {
    width: 100%;
    height: 80px;
    background: #111;
    color: #fff;
    border: none;
    padding: 10px;
    border-radius: 8px;
}

button {
    margin-top: 10px;
    margin-right: 8px;
    padding: 10px 14px;
    background: #333;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 6px;
}

button:hover {
    background: #444;
}
</style>

</head>

<body>

<div id="chat"></div>

<textarea id="input" placeholder="Digite aqui..."></textarea>

<br>

<button onclick="send()">Enviar</button>
<button onclick="continueChat()">Continuar</button>
<button onclick="regenerate()">Nova resposta</button>

<script>
let lastMessage = "";

async function send(customMsg = null) {
    const inputField = document.getElementById("input");
    const message = customMsg || inputField.value;

    if (!message) return;

    addMessage(message, "user");
    lastMessage = message;
    inputField.value = "";

    try {
        const response = await fetch("https://dicrotic-rose-optically.ngrok-free.dev/api/v1/prediction/bb7a93eb-8d6e-4c2e-a23a-0ba7f16f15b4", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ question: message })
        });

        const data = await response.json();
        addMessage(data.text || JSON.stringify(data), "ai");
    } catch (error) {
        addMessage("Erro de conexão com Flowise.", "ai");
    }
}

function continueChat() {
    send("Continue.");
}

function regenerate() {
    if (lastMessage) send(lastMessage);
}

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerText = text;
    document.getElementById("chat").appendChild(div);
    window.scrollTo(0, document.body.scrollHeight);
}
</script>

</body>
</html>
